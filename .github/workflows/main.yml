name: Build Windows EXE

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build EXE Package
        # Task này của KorGE sẽ đóng gói ứng dụng kèm theo JRE thu nhỏ
        run: ./gradlew packageJvmApp --no-daemon

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game2048-windows-package
          # Thư mục chứa file exe và các file phụ trợ
          path: build/jpackage/
